name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "JSON.parse(fs.readFileSync('package.json','utf8')).version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            npm version $TAG_VERSION --no-git-tag-version
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Regenerate .well-known/skills index
        run: node bin/booklib.js build-wellknown

      - name: Commit updated well-known index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/.well-known/
          git diff --staged --quiet || git commit -m "chore: regenerate .well-known/skills index [skip ci]"

      - name: Push well-known index update
        run: git push origin HEAD:refs/heads/main

      - name: Publish @booklib/core to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @booklib/skills to npm (skills content only)
        run: |
          # Build a minimal package.json for skills-only package
          node -e "
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const skillsPkg = {
              name: '@booklib/skills',
              version: pkg.version,
              description: '24 curated knowledge sets from canonical books — structured, tagged, ready for AI agents',
              license: pkg.license,
              repository: pkg.repository,
              homepage: pkg.homepage,
              keywords: ['ai', 'skills', 'agent-skills', 'knowledge', 'mcp'],
              files: ['skills/**']
            };
            fs.writeFileSync('package.json', JSON.stringify(skillsPkg, null, 2));
          "
          mv README.md README.core.md
          mv README.skills.md README.md
          npm publish --access public || echo "⚠ @booklib/skills publish skipped (may already exist at this version)"
          mv README.md README.skills.md
          mv README.core.md README.md
          git checkout package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
