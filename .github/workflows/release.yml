name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Set version from tag
        run: |
          TAG_VERSION=${GITHUB_REF_NAME#v}
          PKG_VERSION=$(node -p "JSON.parse(fs.readFileSync('package.json','utf8')).version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            npm version $TAG_VERSION --no-git-tag-version
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Regenerate .well-known/skills index
        run: node bin/booklib.js build-wellknown

      - name: Commit updated well-known index
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/.well-known/
          git diff --staged --quiet || git commit -m "chore: regenerate .well-known/skills index [skip ci]"

      - name: Push well-known index update
        run: git push origin HEAD:refs/heads/main

      - name: Publish booklib to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @booklib/skills to npm (legacy compatibility)
        run: |
          node -p "JSON.stringify({...JSON.parse(fs.readFileSync('package.json','utf8')), name:'@booklib/skills'}, null, 2)" > package.json.tmp
          mv package.json.tmp package.json
          mv README.md README.core.md
          mv README.skills.md README.md
          npm publish --access public || echo "⚠ @booklib/skills publish skipped (may already exist at this version)"
          mv README.md README.skills.md
          mv README.core.md README.md
          git checkout package.json
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
